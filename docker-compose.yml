version: "3.8"

services:
  # ==========================================
  # Database Service (PostgreSQL)
  # ==========================================
  postgres:
    image: postgres:16-alpine
    container_name: inventory-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres_secure_pwd}
      POSTGRES_DB: ${POSTGRES_DB:-inventory_db}
    ports:
      - "${POSTGRES_EXTERNAL_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-inventory_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - inventory-network

  # ==========================================
  # Backend API Service (FastAPI Server)
  # ==========================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: inventory-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      - POSTGRES_SERVER=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres_secure_pwd}
      - POSTGRES_DB=${POSTGRES_DB:-inventory_db}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - inventory-network

  # ==========================================
  # Frontend Application Service (React/Vite App)
  # ==========================================
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: inventory-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend
    networks:
      - inventory-network

# ==========================================
# Named Volumes & Net Configurations
# ==========================================
volumes:
  postgres_data:
    name: inventory_postgres_production_volume

networks:
  inventory-network:
    name: inventory_production_bridge_network
